<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çocuk Kitap Testi - 4-9 Yaş</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            background: linear-gradient(135deg, #f3f3f3, #ffffff);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        .photo1 {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px;
            height: auto;
        }
        .photo2 {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            height: auto;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px;
        }
        h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }
        .button {
            background-color: #F34800;
            color: white;
            border: none;
            width: 100%;
            max-width: 500px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .button:hover {
            background-color: #d93d00;
            transform: scale(1.05);
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .photo1, .photo2 {
                width: 150px;
            }
            .button {
                height: 50px;
                font-size: 18px;
            }
            h2 {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .photo1, .photo2 {
                width: 100px;
            }
            .button {
                height: 45px;
                font-size: 16px;
            }
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <img src="photo1.webp" alt="Photo 1" class="photo1">
    <img src="photo2.webp" alt="Photo 2" class="photo2">
    <div class="container">
        <h2>Peki hangi temalar ilgimizi daha çok çekiyor?
        </h2>
        <a href="indexcocuk7.html" class="button"> Kendini tanımasını, duygularını anlamasını ve büyürken güçlenmesini sağlayan hikâyeler</a>
        <a href="indexcocuk8.html" class="button"> İyilik, paylaşım, doğruyu bulma ve maneviyat üzerine ilham veren öyküler</a>
       
        
    </div>
</body>
</html>
