<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sıradaki Kitabın Hangisi?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap');
        
        body {
            background: linear-gradient(135deg, #f3f3f3, #ffffff);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .photo1 {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px;
            height: auto;
        }
        .photo2 {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            height: auto;
        }
        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }
        .button {
            background-color: #F34800;
            color: white;
            border: none;
            width: 190px;
            height: 50px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .button:hover {
            background-color: #d93d00;
            transform: scale(1.05);
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 48px;
            }
            .button {
                width: 150px;
                height: 40px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 36px;
            }
            .button {
                width: 120px;
                height: 35px;
                font-size: 14px;
            }
            .photo1, .photo2 {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <img src="photo1.webp" alt="Photo 1" class="photo1">
    <img src="photo2.webp" alt="Photo 2" class="photo2">
    <h1>Sıradaki Kitabın Hangisi?</h1>
    <a href="index1.html" class="button">Teste Başla</a>
</body>
</html>
